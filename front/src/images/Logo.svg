<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <title>Blue White Emblem on Blue Gradient Background</title>
  <defs>
    <linearGradient id="blueBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF6FF"/>
      <stop offset="45%" stop-color="#67B7FF"/>
      <stop offset="100%" stop-color="#1767D8"/>
    </linearGradient>

    <radialGradient id="blueCore" cx="42%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#2478D6"/>
      <stop offset="100%" stop-color="#0752B6"/>
    </radialGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#123A72" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Blue gradient square background -->
  <rect x="0" y="0" width="1080" height="1080" fill="url(#blueBg)"/>

  <!-- Circular blue-and-white badge -->
  <g filter="url(#softShadow)">
    <circle cx="540" cy="540" r="392" fill="#0752B6"/>
    <circle cx="540" cy="540" r="350" fill="#FFFFFF"/>
    <circle cx="540" cy="540" r="314" fill="url(#blueCore)"/>

    <!-- abstract white ornamental core, original non-text symbol -->
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
      <!-- central flowing vertical stroke -->
      <path d="M550 248
               C455 320 432 414 500 495
               C572 581 615 655 560 756
               C520 829 417 830 381 772
               C350 721 382 661 443 646
               C512 629 563 680 539 735"
            stroke-width="58"/>

      <!-- right large flowing curl -->
      <path d="M640 330
               C748 300 842 364 870 452
               C770 375 646 410 612 520
               C584 612 652 694 760 662
               C840 638 860 557 808 520
               C760 487 705 515 701 574"
            stroke-width="48"/>

      <!-- lower sweeping tail -->
      <path d="M506 822
               C625 840 758 792 845 704"
            stroke-width="42"/>

      <!-- left inner curl -->
      <path d="M320 492
               C379 408 466 415 472 493
               C478 566 375 590 340 536
               C306 486 349 430 392 452"
            stroke-width="46"/>

      <!-- small top accent -->
      <path d="M520 248
               C565 226 615 230 648 246"
            stroke-width="24"/>

      <!-- left side accent -->
      <path d="M276 402
               C276 470 274 524 248 585"
            stroke-width="28"/>

      <!-- bottom small curl -->
      <path d="M478 742
               C431 753 399 795 423 832
               C455 881 539 858 542 805"
            stroke-width="42"/>
    </g>
  </g>
</svg>
